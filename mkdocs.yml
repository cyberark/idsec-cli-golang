site_name: Idsec CLI
site_description: Idsec CLI for CyberArk's Identity Security Platform
site_author: CyberArk
repo_url: https://github.com/cyberark/idsec-cli-golang
edit_uri: edit/master/docs

nav:
  - Overview: index.md
  - Getting started: getting_started.md
  - License: license.md
  - How to guides:
      - Prerequisites: howto/prerequisites.md
      - Work with profiles: howto/working_with_profiles.md
      - Work with Idsec cache: howto/working_with_idsec_cache.md
      - Upgrade to the latest version: howto/upgrade_to_the_latest_version.md
      - Refresh authentication: howto/refreshing_authentication.md
      - Simple commands workflow: howto/simple_commands_workflow.md
      - End-user workflows:
          - End-user database workflow: howto/enduser_databases_workflow.md
          - End-user database with short connstring: howto/enduser_databases_with_short_connstring_workflow.md
          - End-user psql workflow: howto/enduser_databases_psql.md
          - End-user Kubernetes workflow: howto/enduser_kubernetes_workflow.md
          - End-user SSH workflow: howto/enduser_ssh_workflow.md
          - End-user RDP workflow: howto/enduser_rdp_workflow.md
      - Install SIA connectors: howto/install_sia_connectors.md
      - Onboard pCloud account: howto/onboard_pcloud_account.md
      - Edit SIA Settings: howto/edit_sia_settings.md
      - Add SIA Certificate: howto/add_sia_certificate.md
      - Create Identity Policy: howto/create_identity_policy.md
      - Create Identity Service User With Attributes: howto/create_identity_service_user_with_attributes.md
      - Create pCloud Application: howto/create_pcloud_application.md
      - Policy:
          - DB Policy CLI workflow: howto/policy/db_policy_cli_workflow.md
          - VM Policy CLI workflow: howto/policy/vm_policy_cli_workflow.md
          - Cloud Access Policy CLI workflow: howto/policy/cloud_access_policy_cli_workflow.md
  - Examples:
      - Commands examples: examples/commands_examples.md
  - CLI commands:
      - Configure: commands/configure.md
      - Login: commands/login.md
      - Exec: commands/exec.md
      - Profiles: commands/profiles.md
      - Cache: commands/cache.md
      - Upgrade: commands/upgrade.md
  - Config:
      - Environment: config/environment.md
      - Telemetry: config/telemetry.md
      - Proxy: config/proxy.md

theme:
  name: material
  font:
    text: Ubuntu
  palette:
    - scheme: default
      primary: dark blue
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - navigation.tracking
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  logo: media/logo.svg
  favicon: media/favicon.ico

markdown_extensions:
  - admonition
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      linenums: true
  - pymdownx.details
  - meta
  - toc:
      permalink: true
      toc_depth: 4
  - attr_list
  - pymdownx.emoji
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

copyright: Copyright &copy; 2025 CyberArk

plugins:
  - search
  - mike:
      alias_type: redirect
  - section-index

extra:
  version:
    provider: mike
